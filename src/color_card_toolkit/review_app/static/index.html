<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>色卡人工标注</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">本地标注</div>
          <h1>色卡人工标注</h1>
        </div>
        <div class="topbar-actions">
          <button id="exportYolo" class="btn">导出 YOLO</button>
          <button id="clearCurrent" class="btn btn-ghost">清空当前图</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="panel filters">
            <label>
              搜索
              <input id="searchInput" type="search" placeholder="输入文件名" />
            </label>
            <label>
              方向
              <select id="orientationFilter">
                <option value="all">全部</option>
                <option value="horizontal">横版</option>
                <option value="vertical">竖版</option>
              </select>
            </label>
            <label class="checkbox-row">
              <input id="completedOnly" type="checkbox" />
              只看已完成
            </label>
            <div id="summaryText" class="summary-text"></div>
          </div>
          <div id="itemList" class="panel item-list"></div>
        </aside>

        <section class="viewer-column">
          <div class="panel viewer-panel">
            <div class="viewer-head">
              <div>
                <div id="currentMeta" class="meta"></div>
                <div id="currentTitle" class="title"></div>
              </div>
              <div class="viewer-actions">
                <label>
                  当前类型
                  <select id="currentOrientation">
                    <option value="horizontal">横版</option>
                    <option value="vertical">竖版</option>
                  </select>
                </label>
                <label id="currentCodeColumnsLabel">
                  数字列数
                  <select id="currentCodeColumns">
                    <option value="2">2列</option>
                    <option value="3">3列</option>
                  </select>
                </label>
                <button id="prevItem" class="btn btn-ghost" type="button">上一张</button>
                <button id="nextItem" class="btn btn-ghost" type="button">下一张</button>
              </div>
            </div>

            <div class="step-panel">
              <div id="stepHint" class="step-hint"></div>
              <div id="roleTabs" class="role-tabs"></div>
            </div>

            <div id="imageFrame" class="image-frame">
              <img id="sourceImage" alt="原始图片" />
              <div id="boxLayer" class="box-layer"></div>
              <div id="draftBox" class="draft-box hidden"></div>
            </div>

            <div class="toolbar">
              <button id="redoRole" class="btn btn-ghost" type="button">重画当前框</button>
              <button id="deleteRole" class="btn btn-ghost" type="button">删除当前框</button>
            </div>
          </div>

          <div class="panel box-panel">
            <div class="panel-title">当前图片框</div>
            <div id="boxList" class="box-list"></div>
          </div>
        </section>

        <aside class="export-column">
          <div class="panel export-panel">
            <div class="panel-title">导出说明</div>
            <textarea id="exportText" rows="18" readonly></textarea>
          </div>
        </aside>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
